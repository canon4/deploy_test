services:

  deploy_test:

    container_name: deploy_test

    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    environment:
      DB_URL: jdbc:mysql://mysql_local:3306/deploy_test
      DB_USER: root
      DB_PASSWORD: root2026.

    ports:
      - "8080:8080"

    depends_on:
      mysql_local:
        condition: service_healthy

    networks:
      - red_local

  mysql_local:

    image: mysql:8.0

    container_name: mysql_local

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root2026.
      MYSQL_DATABASE: deploy_test

    ports:
      - "3307:3306"

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot2026."]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - red_local

networks:
  red_local:
    driver: bridge
